services:
  - type: web
    name: oneelleven-visualizer
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
```

**3. On Render:**
- Go to [render.com](https://render.com) and sign in
- Click **New → Web Service**
- Connect your GitHub repo
- Render will auto-detect the settings, but make sure:
  - **Build Command:** `pip install -r requirements.txt`
  - **Start Command:** `streamlit run app.py --server.port $PORT --server.address 0.0.0.0`

**4. Add your environment variables**
- In your Render service, go to **Environment**
- Add your secret as a key/value pair:
```
SUPABASE_URL = https://yhxzjyykdsfkdrmdxgho.supabase.co/functions/v1/application-task
```
This replaces your `.env` file in production.

**5. Deploy** — hit **Create Web Service** and Render will build and deploy automatically. Every time you push to GitHub it'll redeploy.

---

Your final project structure should look like:
```
your-project/
├── app.py
├── styles.py
├── requirements.txt
├── render.yaml
├── .env            ← local only, never committed
└── .gitignore